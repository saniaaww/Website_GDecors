<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDecors Admin - Kelola Transaksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8F9F7; color: #2C302E; }
        .admin-wrapper { display: flex; min-height: 100vh; transition: all 0.3s; }

        /* Sidebar */
        .admin-sidebar { width: 260px; background: #3d4831; color: white; padding: 30px; position: fixed; height: 100vh; transition: all 0.3s; overflow: hidden; }
        .brand { font-family: 'Playfair Display'; font-size: 2rem; font-weight: 800; margin-bottom: 50px; color: #A8B5A7; display: flex; align-items: center; gap: 15px; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 15px; }
        .sidebar-menu li a { text-decoration: none; color: #D1D5DB; display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; transition: 0.3s; }
        .sidebar-menu li.active a, .sidebar-menu li a:hover { background: #353c2d; color: #fff; }

        /* Burger Toggle */
        .toggle-btn { background: none; border: none; color: #A8B5A7; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .toggle-btn:hover { color: white; }

        /* State Collapse */
        .admin-sidebar.collapsed { width: 80px; padding: 30px 15px; }
        .admin-sidebar.collapsed .brand span, .admin-sidebar.collapsed .menu-text { display: none; }
        .admin-sidebar.collapsed .sidebar-menu li a { justify-content: center; }
        .admin-main.expanded { margin-left: 80px; }

        /* Main Content */
        .admin-main { flex: 1; margin-left: 260px; padding: 40px; transition: all 0.3s; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Tabel Premium */
        .table-responsive { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .table-premium { width: 100%; border-collapse: collapse; }
        .table-premium thead { background: linear-gradient(135deg, #3d4831 0%, #5a6650 100%); color: white; }
        .table-premium th { padding: 18px; text-align: left; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        .table-premium td { padding: 18px; border-bottom: 1px solid #edf2ed; font-size: 0.95rem; }

        /* Status Badge */
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; }
        .badge-checking { background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; }
        .badge-approved { background: #EBF8FF; color: #2B6CB0; border: 1px solid #BEE3F8; }
        .badge-cancelled { background: #F7FAFC; color: #4A5568; border: 1px solid #E2E8F0; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 16px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Buttons */
        .btn-add-new { background: #3d4831; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-edit { background: #E0E7DE; color: #3d4831; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #F3F4F6; color: #374151; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="sidebar">
            <div class="brand">
                <button class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <span>GDecors.</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin_dashboard.html"><i class="fas fa-th-large"></i> <span class="menu-text">Dashboard</span></a></li>
                <li><a href="admin_artikel.html"><i class="fas fa-newspaper"></i> <span class="menu-text">Kelola Artikel</span></a></li>
                <li><a href="admin_produk.html"><i class="fas fa-boxes"></i> <span class="menu-text">Kelola Produk</span></a></li>
                <li><a href="admin_pengguna.html"><i class="fas fa-users"></i> <span class="menu-text">Kelola Pengguna</span></a></li>
                <li class="active"><a href="admin_transaksi.html"><i class="fas fa-receipt"></i> <span class="menu-text">Kelola Transaksi</span></a></li>
                <li style="margin-top: 40px;">
                    <a href="../index.html" onclick="localStorage.clear();" style="color: #FEB2B2;">
                        <i class="fas fa-sign-out-alt"></i> <span class="menu-text">Keluar</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="admin-main" id="main-content">
            <div class="admin-header">
                <div>
                    <h1>Daftar Transaksi</h1>
                    <p style="color: #666;">Otorisasi status pembayaran dan riwayat finansial.</p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table-premium">
                    <thead>
                        <tr><th>No. Invoice</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="transaksi-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="txModal">
        <div class="modal-box">
            <h3 style="margin-bottom: 20px;">Ubah Status Transaksi</h3>
            <input type="hidden" id="edit-tx-id">
            <div class="form-group"><label>Invoice</label><input type="text" id="tx-invoice" readonly style="background:#f4f4f4;"></div>
            <div class="form-group">
                <label>Pilih Status</label>
                <select id="tx-status">
                    <option value="Checking Transfer">Checking Transfer</option>
                    <option value="Selesai / Approved">Selesai / Approved</option>
                    <option value="Dibatalkan">Dibatalkan</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-add-new" onclick="saveStatus()">Simpan</button>
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('main-content').classList.toggle('expanded');
        }

        let transaksiList = JSON.parse(localStorage.getItem('gdecors_history')) || [
            { id: 1, invoice: "GD-98231A", pelanggan: "Sania Putri", total: 5500000, status: "Checking Transfer" },
            { id: 2, invoice: "GD-11024B", pelanggan: "Robbi Hermawan", total: 3200000, status: "Selesai / Approved" }
        ];

        function render() {
            const tbody = document.getElementById('transaksi-table-body');
            tbody.innerHTML = transaksiList.map(t => {
                let badgeClass = t.status === 'Selesai / Approved' ? 'badge-approved' : (t.status === 'Dibatalkan' ? 'badge-cancelled' : 'badge-checking');
                return `
                <tr>
                    <td style="font-weight:700;">${t.invoice}</td>
                    <td>${t.pelanggan}</td>
                    <td>Rp ${t.total.toLocaleString()}</td>
                    <td><span class="badge ${badgeClass}">${t.status}</span></td>
                    <td><button class="btn-edit" onclick="editTx(${t.id})">Edit Status</button></td>
                </tr>
            `}).join('');
            localStorage.setItem('gdecors_history', JSON.stringify(transaksiList));
        }

        function editTx(id) {
            let t = transaksiList.find(i => i.id == id);
            document.getElementById('edit-tx-id').value = t.id;
            document.getElementById('tx-invoice').value = t.invoice;
            document.getElementById('tx-status').value = t.status;
            document.getElementById('txModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('txModal').style.display = 'none'; }

        function saveStatus() {
            const id = document.getElementById('edit-tx-id').value;
            const status = document.getElementById('tx-status').value;
            let idx = transaksiList.findIndex(t => t.id == id);
            if(idx !== -1) {transaksiList[idx].status = status;}
            render(); closeModal();
        }
        render();
    </script>
</body>
</html>
